apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-nids-ingress
  namespace: ai-nids
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - ai-nids.example.com  # Replace with your domain
    secretName: ai-nids-tls
  rules:
  - host: ai-nids.example.com  # Replace with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-nids-app
            port:
              number: 80
      - path: /api/v1/federated
        pathType: Prefix
        backend:
          service:
            name: federated-server
            port:
              number: 5001
      - path: /monitoring/prometheus
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090
      - path: /monitoring/grafana
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000